name: Repair BUG BANG static site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap.yml'
      - 'tools/fix_migration.py'
      - 'tools/fix_navigation.py'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repair migrated links and metadata
        run: python tools/fix_migration.py

      - name: Keep internal navigation in the same tab
        run: python tools/fix_navigation.py

      - name: Commit verified corrections
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No corrections required.'
          else
            git commit -m 'Correct BUG BANG navigation and links [skip ci]'
            git push
          fi
