name: Restore homepage books and layout

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-home-books.yml'
      - 'tools/fix_home_books.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Google Drive downloader
        run: python -m pip install --quiet gdown

      - name: Download missing books from the verified Drive files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/files
          gdown --quiet --id 14KtULzxWly5vfo1aH8fd66MByqYQ5jiI -O assets/files/bug-bang-ro.pdf
          gdown --quiet --id 1OaxxZZNUzmNPi1-uCLPNTppnK2qN9Mig -O assets/files/bug-bang-en.pdf
          gdown --quiet --id 1PQIS4HMxEfrb1xqVO7fUztpFQlvg3LOE -O assets/files/tscn-ro.pdf
          gdown --quiet --id 19bTnZtVBYiHGRFfaPup5at6N0tU5Wtzy -O assets/files/kernel-1-618-ro.pdf
          gdown --quiet --id 1C2p-5YDYse2wM3BTk1G7v-IEjAWr6Nov -O assets/files/kernel-1-618-en.pdf
          gdown --quiet --id 1JGolfjVkp62bpnfnF3pFQxn6ED9SH0w4 -O assets/files/tpn-ro.pdf
          gdown --quiet --id 12aoQzHaMDAMijT6N_lRp3WQJM5hbzxTm -O assets/files/tpn-en.pdf

      - name: Repair cover links and homepage layout
        run: python tools/fix_home_books.py

      - name: Commit verified books and corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html bug-bang-en.html assets/files HOME_BOOKS_REPORT.json
          if git diff --cached --quiet; then
            echo 'No homepage corrections required.'
          else
            git commit -m 'Restore book PDFs and repair homepage covers [skip ci]'
            git push
          fi
